{% extends "base.html" %}
{% block title %}Запись подтверждена{% endblock %}
{% block body %}

<div class="page-wrap">
  <div class="card success-box">
    <div class="emoji">💅</div>
    <h2 class="section-title">Вы успешно записаны!</h2>
    {% if slot %}
      <p class="section-subtitle">Ждём вас {{ slot['date'] }} в {{ slot['time'] }}</p>
    {% endif %}
    <p style="color:var(--text-light);margin-bottom:30px;">
      Если планы изменятся — позвоните нам: {{ info.phone }}
    </p>
    <a class="btn btn-primary" href="{{ url_for('index') }}">На главную</a>
  </div>
</div>

{% endblock %}
